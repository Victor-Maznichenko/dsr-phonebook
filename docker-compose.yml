version: '3.9'

services:
  postgres:
    image: postgres:17.9
    restart: always
    container_name: dsr-database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: dsr_phonebook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    container_name: dsr-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dsr-phonebook-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VITE_API_BASE: http://localhost:7000
      POSTGRES_HOST: localhost    
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: dsr_phonebook
      PORT: 7000                
    ports:
      - "5173:5173"
      - "7000:7000"
    restart: unless-stopped

volumes:
  pgadmin_data:
  postgres_data: